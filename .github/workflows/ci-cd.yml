name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Compilación
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: ./mvnw clean compile -q

      - name: Cache compiled classes
        uses: actions/cache@v4
        with:
          path: target/
          key: build-${{ github.sha }}

  # ─────────────────────────────────────────────
  # JOB 2: Tests unitarios
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: target/surefire-reports/
          retention-days: 15

  # ─────────────────────────────────────────────
  # JOB 3: Análisis de seguridad (bloquea si falla)
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Package project
        run: ./mvnw clean package -DskipTests -q

      - name: Snyk scan — bloquea en vulnerabilidades HIGH/CRITICAL
        uses: snyk/actions/maven@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Snyk — generar reporte SARIF
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Subir SARIF a GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: snyk.sarif

  # ─────────────────────────────────────────────
  # JOB 4: Build y push de imagen Docker
  # ─────────────────────────────────────────────
  docker-build:
    name: Build & Push Docker Image
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          labels: |
            org.opencontainers.image.title=ms-coincidencias
            org.opencontainers.image.description=Microservicio de coincidencias para mascotas perdidas
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest (trazabilidad)
        run: echo "Image digest ${{ steps.build.outputs.digest }}"

  # ─────────────────────────────────────────────
  # JOB 5: Despliegue en entorno simulado
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy — Simulated Environment
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start full stack with Docker Compose
        run: docker compose up --build -d

      - name: Wait for app to be healthy
        run: |
          echo "Esperando que ms-coincidencias-app sea healthy..."
          for i in $(seq 1 24); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' ms-coincidencias-app 2>/dev/null || echo "not_found")
            echo "Intento $i/24: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Servicio saludable."
              exit 0
            fi
            sleep 10
          done
          echo "El servicio no alcanzó estado healthy en 4 minutos."
          docker compose logs coincidencias-service
          exit 1

      - name: Smoke test — verificar API responde
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/coincidencias)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "La API no respondió correctamente."
            exit 1
          fi
          echo "API operativa."

      - name: Mostrar estado de contenedores (trazabilidad)
        if: always()
        run: |
          docker compose ps
          echo "--- Logs app ---"
          docker compose logs --tail=50 coincidencias-service

      - name: Tear down
        if: always()
        run: docker compose down -v
